name: Package (Docker + .deb)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'release-manager/**'
      - 'mina-bench-upload/**'
      - 'buildkite-cache-manager/**'
      - 'packaging/**'
      # deb-toolkit is a submodule: a version bump changes the gitlink at
      # the exact path `deb-toolkit`, not a file under `deb-toolkit/`, so
      # `deb-toolkit/**` would never match. The exact path is what triggers
      # a rebuild when the pointer moves — which is how a deb-toolkit fix
      # (it lives in its own repo) reaches the published image.
      - 'deb-toolkit'
      - '.github/workflows/package.yml'
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'release-manager/**'
      - 'mina-bench-upload/**'
      - 'buildkite-cache-manager/**'
      - 'packaging/**'
      - 'deb-toolkit'
      - '.github/workflows/package.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mina-release-toolkit

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Docker image. Builds on every PR (for sanity); on main / develop / tag it
  # pushes to Docker Hub (docker.io/minaprotocol, publicly pullable — this is
  # the copy CI consumes) and to GHCR.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          # Docker Hub requires a lowercase namespace, so `minaprotocol` is
          # hardcoded rather than derived from ${{ github.repository_owner }}
          # (which is the mixed-case `MinaProtocol`). The same tag set is
          # applied to both registries.
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            docker.io/minaprotocol/mina-release-toolkit
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packaging/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Debian package. Builds the four Rust binaries natively, then invokes
  # deb-toolkit to assemble them into a single .deb. Uploads as a workflow
  # artifact always; attaches to GitHub Release on tag push.
  # ---------------------------------------------------------------------------
  deb:
    name: Debian package
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for attaching to releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: package-deb

      - name: Install Debian build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              fakeroot dpkg-dev build-essential pkg-config libssl-dev

      - name: Compute version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              # Strip the leading `v` from the tag (`v1.2.3` → `1.2.3`).
              VERSION="${GITHUB_REF#refs/tags/v}"
          else
              # For untagged builds: 0.0.0+<short-sha> so the artifact
              # still has a valid Debian version string.
              VERSION="0.0.0+$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build all four binaries
        # The three in-tree crates ship a committed Cargo.lock and
        # build with `--locked`. The deb-toolkit submodule's upstream
        # gitignores its lock so we let cargo resolve fresh for that
        # one — `--locked` would fail with "cannot create the lock
        # file because --locked was passed".
        run: |
          (cd release-manager         && cargo build --release --locked)
          (cd mina-bench-upload       && cargo build --release --locked)
          (cd buildkite-cache-manager && cargo build --release --locked)
          (cd deb-toolkit             && cargo build --release)

      - name: Assemble .deb via deb-toolkit
        run: packaging/build-deb.sh "${{ steps.ver.outputs.version }}" ./out

      - name: Verify the produced .deb
        run: |
          ls -la ./out
          dpkg-deb --info ./out/mina-release-toolkit_${{ steps.ver.outputs.version }}_amd64.deb
          dpkg-deb -c    ./out/mina-release-toolkit_${{ steps.ver.outputs.version }}_amd64.deb

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mina-release-toolkit_${{ steps.ver.outputs.version }}_amd64.deb
          path: out/mina-release-toolkit_${{ steps.ver.outputs.version }}_amd64.deb
          if-no-files-found: error

      # NB: GitHub Release creation + asset attachment for tag pushes
      # lives in `.github/workflows/release.yml`. The Package workflow
      # is responsible only for the artifact build + workflow-artifact
      # upload (always-on) and the GHCR push (docker job, also on tag).
