name: Release Manager CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'release-manager/**'
      - '.github/workflows/release-manager.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'release-manager/**'
      - '.github/workflows/release-manager.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Configure Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: release-manager
        key: ${{ matrix.os }}-${{ matrix.rust }}

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libssl-dev

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install openssl pkg-config

    - name: Check formatting
      run: |
        cd release-manager
        cargo fmt --all -- --check

    - name: Run Clippy
      run: |
        cd release-manager
        cargo clippy --all-targets --all-features

    - name: Run tests
      run: |
        cd release-manager
        cargo test --verbose

    # Integration tests need Docker (for MinIO), deb-s3, dpkg-deb, and aws
    # on PATH. GitHub-hosted Ubuntu runners already provide Docker, dpkg-deb,
    # and aws; we just need to install deb-s3 (a Ruby gem). Skipped on macOS.
    - name: Install integration test deps (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo gem install deb-s3

    - name: Run integration tests (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        cd release-manager
        cargo test --features integration-test --verbose

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: [test]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Configure Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: release-manager

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libssl-dev

    - name: Build release binary
      run: |
        cd release-manager
        cargo build --release
